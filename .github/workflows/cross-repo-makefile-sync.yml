---
name: Cross-Repo Makefile Sync

on:
  push:
    branches: [main]
    paths:
      - 'makefiles/common.mk'
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'Operator SDK version (e.g. v1.37.0). Leave empty for latest.'
        required: false
        type: string
      dry_run:
        description: 'Show diff without creating PRs'
        required: false
        type: boolean
        default: false
      target_repo:
        description: 'Sync only this repo (e.g. awx-operator). Leave empty for all.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sdk_version: ${{ steps.sdk.outputs.version }}
      current_version: ${{ steps.current.outputs.version }}
      has_makefile_update: ${{ steps.diff.outputs.has_changes }}
      should_sync: ${{ steps.should-sync.outputs.result }}
    steps:
      - name: Checkout source (gateway-operator)
        uses: actions/checkout@v4

      - name: Get current SDK version
        id: current
        run: |
          CURRENT=$(grep 'OPERATOR_SDK_VERSION' Makefile | head -1 | grep -o 'v[0-9.]*' || echo "unknown")
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current OPERATOR_SDK_VERSION: ${CURRENT}"

      - name: Resolve target SDK version
        id: sdk
        env:
          INPUT_SDK_VERSION: ${{ inputs.sdk_version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          if [ -n "${INPUT_SDK_VERSION}" ]; then
            echo "version=${INPUT_SDK_VERSION}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push trigger: use current Makefile version
            echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            # Manual trigger without version: fetch latest
            LATEST=$(curl -sSL https://api.github.com/repos/operator-framework/operator-sdk/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
            echo "Latest operator-sdk release: ${LATEST}"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build SDK changelog
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          TARGET_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          CHANGELOG_FILE="sdk-changelog.md"

          if [[ "${CURRENT_VERSION}" == "${TARGET_VERSION}" ]]; then
            echo "SDK version unchanged (${CURRENT_VERSION})" > "${CHANGELOG_FILE}"
            cat "${CHANGELOG_FILE}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### SDK Version Change: ${CURRENT_VERSION} → ${TARGET_VERSION}" > "${CHANGELOG_FILE}"
          echo "" >> "${CHANGELOG_FILE}"

          CURRENT_MINOR=$(echo "${CURRENT_VERSION}" | sed 's/^v//' | cut -d. -f1,2)
          TARGET_MINOR=$(echo "${TARGET_VERSION}" | sed 's/^v//' | cut -d. -f1,2)

          if [[ "${CURRENT_MINOR}" != "${TARGET_MINOR}" ]]; then
            echo "::warning::Minor version bump (${CURRENT_MINOR} → ${TARGET_MINOR}): may contain breaking changes"
            echo "⚠️ **Minor version bump** (${CURRENT_MINOR} → ${TARGET_MINOR})" >> "${CHANGELOG_FILE}"
            echo "" >> "${CHANGELOG_FILE}"
          fi

          # Fetch release notes between current and target
          RELEASES_JSON=$(curl -sSL "https://api.github.com/repos/operator-framework/operator-sdk/releases?per_page=50")

          # Extract per-release summaries
          echo "${RELEASES_JSON}" | jq -r --arg from "${CURRENT_VERSION}" --arg to "${TARGET_VERSION}" '
            [.[] | select(.tag_name > $from and .tag_name <= $to)] |
            sort_by(.tag_name) | .[] |
            "#### " + .tag_name + "\n" + (.body | split("\n") |
              map(select(test("breaking|deprecat|removed|incompatible|migration|bug|fix|feature|add|chang"; "i"))) |
              map("- " + .) | join("\n"))
          ' 2>/dev/null >> "${CHANGELOG_FILE}" || echo "_Could not fetch release notes_" >> "${CHANGELOG_FILE}"

          echo "" >> "${CHANGELOG_FILE}"
          echo "**Full changelog:** [operator-sdk releases](https://github.com/operator-framework/operator-sdk/releases)" >> "${CHANGELOG_FILE}"

          cat "${CHANGELOG_FILE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Makefile from SDK
        if: steps.current.outputs.version != steps.sdk.outputs.version
        env:
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          ./tools/scripts/generate-makefile.sh \
            --sdk-version "${SDK_VERSION}" \
            --output Makefile.generated

      - name: Check for Makefile diff
        id: diff
        run: |
          if [ -f Makefile.generated ] && ! diff -q Makefile Makefile.generated >/dev/null 2>&1; then
            echo "Makefile changes detected"
            diff -u Makefile Makefile.generated || true
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Makefile changes"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: steps.diff.outputs.has_changes == 'true' || steps.current.outputs.version != steps.sdk.outputs.version
        uses: actions/upload-artifact@v4
        with:
          name: sync-artifacts
          path: |
            Makefile.generated
            sdk-changelog.md
          retention-days: 1
          if-no-files-found: ignore

      - name: Determine if sync is needed
        id: should-sync
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_MAKEFILE_CHANGES: ${{ steps.diff.outputs.has_changes }}
        run: |
          if [ "${EVENT_NAME}" = "push" ]; then
            # Push trigger means common.mk changed — always sync
            echo "result=true" >> "$GITHUB_OUTPUT"
          elif [ "${HAS_MAKEFILE_CHANGES}" = "true" ]; then
            # Manual trigger with Makefile changes — sync
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to sync"
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

  sync-repos:
    needs: prepare
    if: needs.prepare.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: cross-repo-sync-${{ matrix.repo }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # TEST ONLY — revert before merging
          - repo: test_ci_action
            org: lucas-benedito
            default_branch: main
          # - repo: aap-gateway-operator
          #   org: ansible
          #   default_branch: main
          # - repo: awx-operator
          #   org: ansible
          #   default_branch: devel
          # - repo: awx-resource-operator
          #   org: ansible
          #   default_branch: devel
          # - repo: eda-server-operator
          #   org: ansible
          #   default_branch: main
          # - repo: galaxy-operator
          #   org: ansible
          #   default_branch: main
          # - repo: ansible-ai-connect-operator
          #   org: ansible
          #   default_branch: main

    steps:
      - name: Skip if not targeted
        if: >-
          inputs.target_repo != '' &&
          inputs.target_repo != matrix.repo
        env:
          MATRIX_REPO: ${{ matrix.repo }}
          INPUT_TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          echo "Skipping ${MATRIX_REPO} (target_repo=${INPUT_TARGET_REPO})"
          echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Checkout source (gateway-operator)
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Download sync artifacts
        if: env.SKIP != 'true'
        uses: actions/download-artifact@v4
        with:
          name: sync-artifacts
          path: /tmp/sync-artifacts
        continue-on-error: true

      - name: Sync to target repo
        if: env.SKIP != 'true'
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
          SDK_VERSION: ${{ needs.prepare.outputs.sdk_version }}
          REPO: ${{ matrix.org }}/${{ matrix.repo }}
          DEFAULT_BRANCH: ${{ matrix.default_branch }}
          IS_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          HAS_MAKEFILE_UPDATE: ${{ needs.prepare.outputs.has_makefile_update }}
        run: |
          ARGS=(
            --repo "${REPO}"
            --branch "${DEFAULT_BRANCH}"
            --sdk-version "${SDK_VERSION}"
            --source-dir "."
          )
          if [ "${HAS_MAKEFILE_UPDATE}" = "true" ] && [ -f /tmp/sync-artifacts/Makefile.generated ]; then
            ARGS+=(--makefile "/tmp/sync-artifacts/Makefile.generated")
          fi
          if [ -f /tmp/sync-artifacts/sdk-changelog.md ]; then
            ARGS+=(--changelog "/tmp/sync-artifacts/sdk-changelog.md")
          fi
          if [ "${IS_DRY_RUN}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          ./tools/scripts/sync-to-repo.sh "${ARGS[@]}"
