---
name: Cross-Repo Makefile Sync

on:
  push:
    branches: [main]
    paths:
      - 'Makefile'
      - 'scripts/common.mk'
  schedule:
    # Weekly sync (Monday 9am UTC, after makefile-sync at 8am)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Show diff without creating PRs'
        required: false
        type: boolean
        default: false
      target_repo:
        description: 'Sync only this repo (e.g. awx-operator). Leave empty for all.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    concurrency:
      group: cross-repo-sync-${{ matrix.repo }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # TEST ONLY — revert before merging
          - repo: test_ci_action
            org: lucas-benedito
            default_branch: main
          # - repo: aap-gateway-operator
          #   org: ansible
          #   default_branch: main
          # - repo: awx-operator
          #   org: ansible
          #   default_branch: devel
          # - repo: awx-resource-operator
          #   org: ansible
          #   default_branch: devel
          # - repo: eda-server-operator
          #   org: ansible
          #   default_branch: main
          # - repo: galaxy-operator
          #   org: ansible
          #   default_branch: main
          # - repo: ansible-ai-connect-operator
          #   org: ansible
          #   default_branch: main

    steps:
      - name: Skip if not targeted
        if: >-
          inputs.target_repo != '' &&
          inputs.target_repo != matrix.repo
        env:
          MATRIX_REPO: ${{ matrix.repo }}
          INPUT_TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          echo "Skipping ${MATRIX_REPO} (target_repo=${INPUT_TARGET_REPO})"
          echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Checkout source (gateway-operator)
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Resolve SDK version
        if: env.SKIP != 'true'
        id: sdk
        run: |
          SDK_VER=$(grep 'OPERATOR_SDK_VERSION' Makefile | head -1 | grep -o 'v[0-9.]*')
          if [ -z "${SDK_VER}" ]; then
            echo "ERROR: Could not resolve OPERATOR_SDK_VERSION from Makefile"
            exit 1
          fi
          echo "version=${SDK_VER}" >> "$GITHUB_OUTPUT"

      - name: Sync to target repo
        if: env.SKIP != 'true'
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
          REPO: ${{ matrix.org }}/${{ matrix.repo }}
          DEFAULT_BRANCH: ${{ matrix.default_branch }}
          IS_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          ARGS=(
            --repo "${REPO}"
            --branch "${DEFAULT_BRANCH}"
            --sdk-version "${SDK_VERSION}"
            --source-dir "."
          )
          if [ "${IS_DRY_RUN}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          ./tools/scripts/sync-to-repo.sh "${ARGS[@]}"
